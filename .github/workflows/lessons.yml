name: Validate PowerShell course

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install development modules
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.5.0 -MaximumVersion 6.99.99 -Force -Scope CurrentUser
          Install-Module -Name PSScriptAnalyzer -MinimumVersion 1.22.0 -Force -Scope CurrentUser
      - name: Parse all course scripts
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path lessons, exercises, project -Recurse -Filter *.ps1
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $file.FullName, [ref] $tokens, [ref] $errors) | Out-Null
            if ($errors.Count -gt 0) { throw "Parse error in $($file.FullName): $($errors.Message -join '; ')" }
          }
      - name: Run lesson and reference solution scripts
        shell: pwsh
        run: |
          Get-ChildItem -Path lessons -Recurse -Filter *.ps1 | ForEach-Object { & $_.FullName }
          Get-ChildItem -Path exercises -Recurse -Filter solutions.ps1 | ForEach-Object { & $_.FullName }
      - name: Analyze scripts
        shell: pwsh
        run: Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1 -EnableExit
      - name: Run capstone tests
        shell: pwsh
        run: Invoke-Pester -Path ./project/TaskManager/tests -Output Detailed -CI
