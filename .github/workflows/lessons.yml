name: Validate PowerShell course

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  linux-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        powershell-image: ['7.4-ubuntu-22.04', 'ubuntu-22.04']
        pester-version: ['5.5.0', '6.0.0']
    container:
      image: mcr.microsoft.com/powershell:${{ matrix.powershell-image }}
    steps:
      - uses: actions/checkout@v7
      - name: Install development modules
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ($PSVersionTable.PSVersion -lt [version]'7.4') {
            throw 'PowerShell 7.4 or newer is required.'
          }
          Install-PSResource -Name Pester -Version '${{ matrix.pester-version }}' -Repository PSGallery -Scope CurrentUser -TrustRepository
          Install-PSResource -Name PSScriptAnalyzer -Version '1.25.0' -Repository PSGallery -Scope CurrentUser -TrustRepository
          Install-PSResource -Name SimplySql -Version '2.2.0.106' -Repository PSGallery -Scope CurrentUser -TrustRepository
      - name: Parse all course scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = Get-ChildItem -Path lessons, exercises, capstones -Recurse -File |
            Where-Object Extension -in '.ps1', '.psm1' |
            Sort-Object FullName
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $file.FullName, [ref] $tokens, [ref] $errors) | Out-Null
            if ($errors.Count -gt 0) { throw "Parse error in $($file.FullName): $($errors.Message -join '; ')" }
          }
      - name: Run lesson and reference solution scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          Import-Module Pester -RequiredVersion '${{ matrix.pester-version }}' -Force
          Get-ChildItem -Path lessons -Recurse -Filter *.ps1 |
            Sort-Object FullName |
            ForEach-Object { & $_.FullName }
          Get-ChildItem -Path exercises -Recurse -Filter solutions.ps1 |
            Sort-Object FullName |
            ForEach-Object { & $_.FullName }
      - name: Analyze scripts
        shell: pwsh
        run: |
          Import-Module PSScriptAnalyzer -RequiredVersion '1.25.0' -Force
          Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1 -EnableExit
      - name: Run capstone tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Import-Module Pester -RequiredVersion '${{ matrix.pester-version }}' -Force
          pwsh -NoProfile -File ./capstones/Invoke-CapstoneTests.ps1 -Implementation All -Tag Smoke -CI
          pwsh -NoProfile -File ./capstones/Invoke-CapstoneTests.ps1 -Capstone Comparative -Implementation Solution -Tag All -CI
          pwsh -NoProfile -File ./capstones/Invoke-CapstoneTests.ps1 -Capstone Idiomatic -Implementation Solution -Tag All -CI

  cross-platform:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Install development modules
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ($PSVersionTable.PSVersion -lt [version]'7.4') {
            throw 'PowerShell 7.4 or newer is required.'
          }
          Install-PSResource -Name Pester -Version '6.0.0' -Repository PSGallery -Scope CurrentUser -TrustRepository
          Install-PSResource -Name PSScriptAnalyzer -Version '1.25.0' -Repository PSGallery -Scope CurrentUser -TrustRepository
          Install-PSResource -Name SimplySql -Version '2.2.0.106' -Repository PSGallery -Scope CurrentUser -TrustRepository
      - name: Parse all course scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = Get-ChildItem -Path lessons, exercises, capstones -Recurse -File |
            Where-Object Extension -in '.ps1', '.psm1' |
            Sort-Object FullName
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $file.FullName, [ref] $tokens, [ref] $errors) | Out-Null
            if ($errors.Count -gt 0) { throw "Parse error in $($file.FullName): $($errors.Message -join '; ')" }
          }
      - name: Run lesson and reference solution scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          Import-Module Pester -RequiredVersion '6.0.0' -Force
          Get-ChildItem -Path lessons -Recurse -Filter *.ps1 |
            Sort-Object FullName |
            ForEach-Object { & $_.FullName }
          Get-ChildItem -Path exercises -Recurse -Filter solutions.ps1 |
            Sort-Object FullName |
            ForEach-Object { & $_.FullName }
      - name: Analyze scripts
        shell: pwsh
        run: |
          Import-Module PSScriptAnalyzer -RequiredVersion '1.25.0' -Force
          Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1 -EnableExit
      - name: Run capstone tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Import-Module Pester -RequiredVersion '6.0.0' -Force
          pwsh -NoProfile -File ./capstones/Invoke-CapstoneTests.ps1 -Implementation All -Tag Smoke -CI
          pwsh -NoProfile -File ./capstones/Invoke-CapstoneTests.ps1 -Capstone Comparative -Implementation Solution -Tag All -CI
          pwsh -NoProfile -File ./capstones/Invoke-CapstoneTests.ps1 -Capstone Idiomatic -Implementation Solution -Tag All -CI
